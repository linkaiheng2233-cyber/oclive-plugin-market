name: CI

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build (same base as Pages)
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
